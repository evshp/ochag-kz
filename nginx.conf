events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript application/json;

  # Rate limit zone: 10 requests/minute per IP for auth endpoint
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name ochagi-kaminy.kz www.ochagi-kaminy.kz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name ochagi-kaminy.kz www.ochagi-kaminy.kz;

    ssl_certificate     /etc/letsencrypt/live/ochagi-kaminy.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ochagi-kaminy.kz/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/auth/login {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
