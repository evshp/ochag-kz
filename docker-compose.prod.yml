services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ochag
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_create_users.up.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./backend/migrations/002_create_products.up.sql:/docker-entrypoint-initdb.d/02_products.sql:ro
      - ./backend/migrations/003_create_contacts.up.sql:/docker-entrypoint-initdb.d/03_contacts.sql:ro
      - ./backend/migrations/004_add_image_url.up.sql:/docker-entrypoint-initdb.d/04_image_url.sql:ro
      - ./backend/migrations/005_create_inventory.up.sql:/docker-entrypoint-initdb.d/05_inventory.sql:ro
      - ./backend/migrations/006_create_recommendations.up.sql:/docker-entrypoint-initdb.d/06_recommendations.sql:ro
      - ./backend/migrations/007_add_description_and_accessories.up.sql:/docker-entrypoint-initdb.d/07_description.sql:ro
      - ./backend/migrations/008_update_image_urls.up.sql:/docker-entrypoint-initdb.d/08_update_image_urls.sql:ro
      - ./backend/migrations/seed.sql:/docker-entrypoint-initdb.d/09_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ochag"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/ochag?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./backend/web/assets:/app/web/assets
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
