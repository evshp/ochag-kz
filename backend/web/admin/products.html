<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товары — Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0d0907">
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/admin.css">
  <link rel="stylesheet" href="/styles/admin-layout.css">
</head>
<body>

<button class="admin-sidebar-toggle" id="sidebarToggle">&#9776;</button>

<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <a href="/" class="admin-sidebar-logo">ОЧАГИ<span>&amp;КАМИНЫ</span></a>
    <nav class="admin-nav">
      <a href="/admin/products" class="admin-nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/></svg>
        Товары
      </a>
      <a href="/admin/stock" class="admin-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Склад
      </a>
      <a href="/admin/users" class="admin-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Пользователи
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      <div class="admin-sidebar-user">
        <span id="sidebarUser"></span>
        <span id="sidebarRole" class="admin-sidebar-role"></span>
      </div>
      <button class="admin-sidebar-logout" id="logoutBtn">Выйти</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="admin-main">
    <div class="admin-page-header">
      <h1>Товары</h1>
    </div>

    <!-- Product Form (collapsible) -->
    <div id="productFormSection" class="ap-form-panel">
      <button class="ap-form-toggle" id="productFormToggle">
        <span class="ap-form-toggle-icon">+</span>
        <span id="productFormTitle">Добавить товар</span>
      </button>
      <div class="ap-form-body" id="productFormBody">
        <div class="ap-form-grid">
          <label class="ap-field">
            <span class="ap-field-label">Название</span>
            <input type="text" id="productName" class="ap-input" placeholder="Название товара">
          </label>
          <label class="ap-field">
            <span class="ap-field-label">Категория</span>
            <select id="productCategory" class="ap-input">
              <option value="bowl">Костровая чаша</option>
              <option value="table">Костровой стол</option>
              <option value="oven">Камин уличный</option>
              <option value="accessory">Аксессуар</option>
            </select>
          </label>
          <label class="ap-field">
            <span class="ap-field-label">Цена (тг)</span>
            <input type="number" id="productPrice" class="ap-input" placeholder="0" min="0">
          </label>
          <label class="ap-field">
            <span class="ap-field-label">Бейдж</span>
            <input type="text" id="productBadge" class="ap-input" placeholder="Хит продаж">
          </label>
          <label class="ap-field ap-field--wide">
            <span class="ap-field-label">Описание</span>
            <input type="text" id="productDescription" class="ap-input" placeholder="Краткое описание товара">
          </label>
          <label class="ap-field ap-field--wide">
            <span class="ap-field-label">URL картинки</span>
            <input type="text" id="productImageUrl" class="ap-input" placeholder="https://...">
          </label>
        </div>

        <!-- Specs: dynamic label/value rows -->
        <div class="ap-dynlist">
          <div class="ap-dynlist-header">
            <span class="ap-field-label">Характеристики</span>
            <button type="button" class="ap-dynlist-add" id="addSpecBtn">+ Добавить</button>
          </div>
          <div id="specsContainer" class="ap-dynlist-rows"></div>
        </div>

        <!-- Options: dynamic name/price rows -->
        <div class="ap-dynlist">
          <div class="ap-dynlist-header">
            <span class="ap-field-label">Доп. опции (с ценой)</span>
            <button type="button" class="ap-dynlist-add" id="addOptionBtn">+ Добавить</button>
          </div>
          <div id="optionsContainer" class="ap-dynlist-rows"></div>
        </div>

        <div class="ap-form-actions">
          <button class="ap-btn ap-btn--primary" id="productSubmitBtn">Добавить</button>
          <button class="ap-btn ap-btn--ghost" id="productCancelBtn" style="display:none">Отмена</button>
        </div>
      </div>
    </div>

    <!-- Search & Filters bar -->
    <div class="ap-controls">
      <div class="ap-search">
        <svg class="ap-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="productSearch" class="ap-search-input" placeholder="Поиск по названию...">
        <span class="ap-search-count" id="productSearchCount"></span>
      </div>
      <div class="ap-filters" id="productFilters">
        <button class="ap-chip ap-chip--active" data-filter="all">Все</button>
        <button class="ap-chip" data-filter="bowl">Чаши</button>
        <button class="ap-chip" data-filter="table">Столы</button>
        <button class="ap-chip" data-filter="oven">Камины</button>
        <button class="ap-chip" data-filter="accessory">Аксессуары</button>
      </div>
      <div class="ap-sort">
        <select id="productSort" class="ap-sort-select">
          <option value="name">По названию</option>
          <option value="price-asc">Цена ↑</option>
          <option value="price-desc">Цена ↓</option>
          <option value="category">По категории</option>
        </select>
      </div>
    </div>

    <!-- Product cards grid -->
    <div class="ap-grid" id="adminProductsGrid"></div>
    <div class="ap-empty" id="adminProductsEmpty" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <p>Ничего не найдено</p>
    </div>
  </main>
</div>

<!-- Recommendations Modal -->
<div id="recModal" class="rec-overlay">
  <div class="rec-panel">
    <div class="rec-header">
      <div>
        <h3 id="recModalTitle" class="rec-title">Рекомендации</h3>
        <p class="rec-subtitle">Выберите товары для рекомендаций (макс. 10)</p>
      </div>
      <button class="rec-close" id="recCloseBtn" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="rec-selected-area" id="recSelectedArea">
      <span class="rec-selected-label">Выбрано: <strong id="recSelectedCount">0</strong></span>
      <div class="rec-selected-list" id="recSelectedList"></div>
    </div>

    <div class="rec-search-wrap">
      <svg class="rec-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="recSearch" class="rec-search" placeholder="Поиск товара...">
    </div>

    <div class="rec-chips" id="recChips">
      <button class="ap-chip ap-chip--active ap-chip--sm" data-rec-filter="all">Все</button>
      <button class="ap-chip ap-chip--sm" data-rec-filter="bowl">Чаши</button>
      <button class="ap-chip ap-chip--sm" data-rec-filter="table">Столы</button>
      <button class="ap-chip ap-chip--sm" data-rec-filter="oven">Камины</button>
      <button class="ap-chip ap-chip--sm" data-rec-filter="accessory">Аксессуары</button>
    </div>

    <div id="recProductList" class="rec-list"></div>

    <div class="rec-footer">
      <button class="ap-btn ap-btn--primary" id="recSaveBtn">Сохранить</button>
      <button class="ap-btn ap-btn--ghost" id="recCancelBtn">Отмена</button>
    </div>
  </div>
</div>

<script src="/js/admin-common.js"></script>
<script src="/js/admin-products.js"></script>
</body>
</html>
