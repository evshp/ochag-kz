<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#0d0907">
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/admin.css">
  <style>
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrapper { width: 100%; max-width: 400px; padding: 2rem; }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo a { font-family: var(--font-display); font-size: 1.5rem; color: var(--text); text-decoration: none; letter-spacing: 0.05em; }
    .login-logo a span { color: var(--accent); }
    .login-title { font-family: var(--font-display); font-size: 1.8rem; text-align: center; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-logo">
    <a href="/">ОЧАГИ<span>&amp;КАМИНЫ</span></a>
  </div>
  <h1 class="login-title">Панель администратора</h1>
  <div class="admin-login" style="display:block">
    <input type="text" id="adminUsername" class="admin-input" placeholder="Логин" autocomplete="off">
    <input type="password" id="adminPassword" class="admin-input" placeholder="Пароль" autocomplete="current-password">
    <button class="admin-login-btn" id="loginBtn">Войти</button>
    <p id="adminError" class="admin-error"></p>
  </div>
</div>

<script src="/js/admin-common.js"></script>
<script>
(function() {
  // If already logged in, redirect to products
  if (AdminCommon.getUser()) {
    window.location.href = '/admin/products';
    return;
  }

  async function doLogin() {
    var username = document.getElementById('adminUsername').value.trim();
    var password = document.getElementById('adminPassword').value;
    var errEl = document.getElementById('adminError');

    if (!username || !password) {
      errEl.textContent = 'Введите логин и пароль';
      errEl.style.display = 'block';
      return;
    }

    try {
      var res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });

      if (!res.ok) {
        var data = await res.json();
        errEl.textContent = data.error || 'Неверный логин или пароль';
        errEl.style.display = 'block';
        return;
      }

      var data = await res.json();
      AdminCommon.setSession(data.token);
      window.location.href = '/admin/products';
    } catch(e) {
      errEl.textContent = 'Ошибка подключения к серверу';
      errEl.style.display = 'block';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('adminPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('adminUsername').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
})();
</script>
</body>
</html>
