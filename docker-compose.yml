services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ochag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_create_users.up.sql:/docker-entrypoint-initdb.d/01_users.sql:ro
      - ./backend/migrations/002_create_products.up.sql:/docker-entrypoint-initdb.d/02_products.sql:ro
      - ./backend/migrations/003_create_contacts.up.sql:/docker-entrypoint-initdb.d/03_contacts.sql:ro
      - ./backend/migrations/004_add_image_url.up.sql:/docker-entrypoint-initdb.d/04_image_url.sql:ro
      - ./backend/migrations/seed.sql:/docker-entrypoint-initdb.d/05_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ochag}"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ochag}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
    volumes:
      - ./backend/web:/app/web:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
